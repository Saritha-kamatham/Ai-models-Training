<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodDash | Page Not Found</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header></header>

    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; flex-grow: 1; text-align: center; padding: 4rem 1rem;">
        <div class="glass-panel" style="max-width: 500px; padding: 3rem 2rem;">
            <i class="fas fa-pizza-slice" style="font-size: 5rem; color: var(--primary-color); margin-bottom: 2rem; transform: rotate(-25deg); animation: float 4s ease-in-out infinite;"></i>
            <h1 style="font-size: 4rem; font-weight: 800; background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 1rem;">404</h1>
            <h3 style="margin-bottom: 1rem;">Page Melted Away!</h3>
            <p style="color: var(--text-secondary); margin-bottom: 2rem; line-height: 1.6;">The page you are looking for does not exist, or has been eaten by someone else. Let's get you back to browsing hot and fresh food.</p>
            <a href="index.html" class="btn btn-primary"><i class="fas fa-home"></i> Go Back Home</a>
        </div>
    </div>

    <footer>
        <div class="footer-bottom">
            <p>&copy; 2026 FoodDash Delivery. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
