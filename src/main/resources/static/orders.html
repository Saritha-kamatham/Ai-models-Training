<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodDash | My Orders</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header></header>

    <div style="padding-top: 2rem;">
        <h2 class="section-title">My Orders</h2>

        <div class="orders-list" id="orders-container">
            <!-- Dynamically populated -->
        </div>

        <!-- Empty State (hidden by default) -->
        <div id="orders-empty-state" style="display: none; text-align: center; padding: 5rem 1rem;">
            <i class="fas fa-clipboard-list" style="font-size: 4rem; color: var(--text-muted); margin-bottom: 1.5rem;"></i>
            <h3>No Orders Yet</h3>
            <p style="color: var(--text-secondary); margin-bottom: 2rem; margin-top: 0.5rem;">You haven't placed any orders yet. Try out some dishes!</p>
            <a href="restaurants.html" class="btn btn-primary">Browse Restaurants</a>
        </div>
    </div>

    <footer>
        <div class="footer-bottom">
            <p>&copy; 2026 FoodDash Delivery. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
    <script src="js/orders.js"></script>
</body>
</html>
