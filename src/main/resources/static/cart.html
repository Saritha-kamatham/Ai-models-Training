<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodDash | My Cart</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header></header>

    <div style="padding-top: 2rem;">
        <h2 class="section-title">Shopping Cart</h2>

        <div class="cart-container" id="cart-content-wrapper">
            <!-- Left Side: Cart Items -->
            <div class="cart-items-section" id="cart-items-container">
                <!-- Dynamically loaded -->
            </div>

            <!-- Right Side: Order Summary -->
            <div class="cart-summary glass-panel" id="cart-summary-container">
                <!-- Dynamically loaded -->
            </div>
        </div>
        
        <!-- Cart Empty State (hidden by default) -->
        <div id="cart-empty-state" style="display: none; text-align: center; padding: 5rem 1rem;">
            <i class="fas fa-shopping-basket" style="font-size: 4rem; color: var(--text-muted); margin-bottom: 1.5rem;"></i>
            <h3>Your Cart is Empty</h3>
            <p style="color: var(--text-secondary); margin-bottom: 2rem; margin-top: 0.5rem;">Add delicious food items from restaurants to satisfy your hunger!</p>
            <a href="restaurants.html" class="btn btn-primary">Browse Restaurants</a>
        </div>
    </div>

    <footer>
        <div class="footer-bottom">
            <p>&copy; 2026 FoodDash Delivery. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
