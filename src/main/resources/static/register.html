<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodDash | Register</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header></header>

    <div class="auth-wrapper" style="padding: 2rem 1rem;">
        <div class="auth-card glass-panel" style="max-width: 600px;">
            <div class="auth-header">
                <h2>Join FoodDash</h2>
                <p>Create your account to start ordering or selling food</p>
            </div>

            <form id="register-form" onsubmit="handleRegisterSubmit(event)">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group" style="grid-column: span 2;">
                        <label for="fullName">Full Name</label>
                        <div class="form-control-wrapper">
                            <i class="fas fa-user"></i>
                            <input type="text" id="fullName" class="form-control" placeholder="John Doe" required>
                        </div>
                        <div class="error-message" id="name-error"></div>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <div class="form-control-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" class="form-control" placeholder="john@example.com" required>
                        </div>
                        <div class="error-message" id="email-error"></div>
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <div class="form-control-wrapper">
                            <i class="fas fa-phone"></i>
                            <input type="tel" id="phone" class="form-control" placeholder="10-digit number" required>
                        </div>
                        <div class="error-message" id="phone-error"></div>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="form-control-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" class="form-control" placeholder="Min 6 characters" required>
                        </div>
                        <div class="error-message" id="password-error"></div>
                    </div>

                    <div class="form-group">
                        <label for="role">Register As</label>
                        <div class="form-control-wrapper">
                            <i class="fas fa-user-tag" style="left: 1rem; color: var(--text-muted);"></i>
                            <select id="role" class="form-control" style="padding-left: 2.8rem; background: var(--bg-primary);">
                                <option value="CUSTOMER">Customer</option>
                                <option value="OWNER">Restaurant Owner</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group" style="grid-column: span 2;">
                        <label for="address">Delivery Address</label>
                        <div class="form-control-wrapper">
                            <i class="fas fa-map-marker-alt" style="top: 1rem;"></i>
                            <textarea id="address" class="form-control" rows="2" placeholder="Street Name, Building / Apt No" style="resize: none; padding-left: 2.8rem;"></textarea>
                        </div>
                    </div>

                    <div class="form-group" style="grid-column: span 2;">
                        <label for="city">City</label>
                        <div class="form-control-wrapper">
                            <i class="fas fa-city"></i>
                            <input type="text" id="city" class="form-control" placeholder="Metropolis" required>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.9rem; margin-top: 1rem;">Create Account</button>
            </form>

            <p style="text-align: center; margin-top: 2rem; color: var(--text-secondary);">
                Already have an account? <a href="login.html" class="form-link">Login here</a>
            </p>
        </div>
    </div>

    <footer>
        <div class="footer-bottom" style="border-top: 1px solid var(--glass-border); padding-top: 1.5rem;">
            <p>&copy; 2026 FoodDash Delivery. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
    <script src="js/register.js"></script>
</body>
</html>
